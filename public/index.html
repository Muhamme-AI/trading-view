const PAGE_LABELS = {
  thisweek: 'This Week', dashboard: 'Dashboard', performance: 'Performance',
  analysis: 'Analysis', journal: 'Journal', scorer: 'News Scorer',
  log: 'Log Trade', newscheck: 'News Ratings', settings: 'Settings',
};

function updateViewContext(patch) {
  Object.assign(viewContext, patch || {});
  refreshAgentContextBadge();
}

function getLiveContext() {
  return {
    page,
    pageLabel: PAGE_LABELS[page] || page,
    selectedEvent: viewContext.detailEvent || viewContext.selectedEvent || null,
    filters: {
      ...filterState,
      dashTradeType,
      perfTradeType,
      journalTab,
    },
    snapshot: viewContext.snapshot || {},
    scorerInput: viewContext.scorerInput || null,
    liveAssistant: liveAssistantState ? {
      stage: liveAssistantState.stage,
      event: liveAssistantState.brief?.event_name || liveAssistantState.brief?.event,
      currentPrice: liveAssistantState.currentPrice,
    } : null,
    timestamp: new Date().toISOString(),
  };
}

function refreshAgentContextBadge() {
  const ctx = getLiveContext();
  const parts = [ctx.pageLabel];
  if (ctx.selectedEvent) parts.push(ctx.selectedEvent.replace(/ US$| UK$/, ''));
  if (ctx.liveAssistant?.event) parts.push(`Live: ${ctx.liveAssistant.stage}`);
  const label = `Context: ${parts.join(' · ')}`;
  const pill = document.getElementById('agent-context-pill');
  const top = document.getElementById('topbar-context');
  if (pill) { pill.textContent = label; pill.title = JSON.stringify(ctx, null, 2); }
  if (top) top.textContent = agentPanelOpen ? label : '';
}

function toggleAgentPanel(force) {
  agentPanelOpen = typeof force === 'boolean' ? force : !agentPanelOpen;
  const panel = document.getElementById('agent-panel');
  const workspace = document.getElementById('workspace');
  const btn = document.getElementById('agent-toggle');
  if (panel) {
    panel.classList.toggle('open', agentPanelOpen);
    panel.setAttribute('aria-hidden', agentPanelOpen ? 'false' : 'true');
  }
  if (workspace) workspace.classList.toggle('agent-open', agentPanelOpen);
  if (btn) btn.classList.toggle('open', agentPanelOpen);
  refreshAgentContextBadge();
  if (agentPanelOpen) initAgentPanel();
}

async function initAgentPanel() {
  refreshAgentContextBadge();
  if (agentConfigured === null) {
    try {
      const st = await GET('/agent/status');
      agentConfigured = st.configured;
      if (!st.configured) {
        renderAgentWelcome('Add OPENAI_API_KEY to your .env file to enable the AI advisor.');
        return;
      }
    } catch (e) {
      agentConfigured = false;
      renderAgentWelcome('Could not reach agent API.');
      return;
    }
  }
  if (!agentSessionId) await ensureAgentSession();
  if (agentMessages.length === 0) await loadAgentHistory();
  if (agentMessages.length === 0) {
    renderAgentWelcome(
      'Ask me about upcoming news, historical reactions, or whether a setup is tradeable. ' +
      'I use your synced analysis data and the tab you have open right now.'
    );
  } else {
    renderAgentMessages();
  }
}

function renderAgentWelcome(extra) {
  const el = document.getElementById('agent-messages');
  if (!el) return;
  el.innerHTML = `<div class="agent-msg system">${extra || ''}</div>`;
}

async function ensureAgentSession() {
  const r = await POST('/agent/session', { session_id: agentSessionId });
  agentSessionId = r.session_id;
  localStorage.setItem('agentSessionId', agentSessionId);
  return agentSessionId;
}

async function newAgentSession() {
  agentSessionId = null;
  agentMessages = [];
  localStorage.removeItem('agentSessionId');
  await ensureAgentSession();
  renderAgentWelcome('New conversation started. What would you like to analyse?');
}

async function loadAgentHistory() {
  if (!agentSessionId) return;
  try {
    const data = await GET('/agent/session/' + encodeURIComponent(agentSessionId) + '/history');
    agentMessages = (data.messages || []).filter(m => m.role === 'user' || m.role === 'assistant');
  } catch (e) {
    agentMessages = [];
  }
}

function renderAgentMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<span class="md-strong">$1</span>')
    .replace(/\n/g, '<br>');
}

function renderAgentMessages() {
  const el = document.getElementById('agent-messages');
  if (!el) return;
  el.innerHTML = agentMessages.map(m => {
    const conf = m.metadata?.confidence;
    const confHtml = m.role === 'assistant' && conf
      ? `<div class="agent-confidence ${conf}">Confidence: ${conf}</div>` : '';
    return `<div class="agent-msg ${m.role}">${renderAgentMarkdown(m.content)}${confHtml}</div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function appendAgentMessage(role, content, meta) {
  agentMessages.push({ role, content, metadata: meta || {} });
  renderAgentMessages();
}

function agentInputKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendAgentMessage();
  }
}

async function sendAgentMessage() {
  if (agentSending || !agentConfigured) return;
  const input = document.getElementById('agent-input');
  const sendBtn = document.getElementById('agent-send');
  const text = (input?.value || '').trim();
  if (!text) return;

  agentSending = true;
  if (sendBtn) sendBtn.disabled = true;
  if (input) input.value = '';
  appendAgentMessage('user', text);

  const typing = document.createElement('div');
  typing.className = 'agent-typing';
  typing.innerHTML = '<span>Analysing</span><span class="agent-typing-dots"><span></span><span></span><span></span></span>';
  document.getElementById('agent-messages')?.appendChild(typing);

  try {
    await ensureAgentSession();
    const liveContext = getLiveContext();
    const res = await fetch(API + '/agent/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: agentSessionId, live_context: liveContext }),
    });
    typing.remove();
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    appendAgentMessage('assistant', data.reply, {
      confidence: data.confidence,
      guardrail_applied: data.guardrail_applied,
    });
    if (data.guardrail_applied) toast('AI withheld low-confidence directional advice', 'success');
  } catch (e) {
    typing.remove();
    appendAgentMessage('assistant', 'Sorry — I could not process that: ' + e.message);
  } finally {
    agentSending = false;
    if (sendBtn) sendBtn.disabled = false;
    input?.focus();
  }
}

// ── INIT ──────────────────────────────────────────────────
render();
setInterval(()=>{if(page==='dashboard')loadPrice();},30000);
</script>
